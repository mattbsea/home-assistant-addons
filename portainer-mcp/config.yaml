---
name: "Portainer MCP"
description: "Exposes Portainer management to AI clients via MCP with a secret-path HTTP URL"
version: "0.1.2"
slug: "portainer_mcp"
init: false
url: "https://github.com/mattbsea/home-assistant-addons"

arch:
  - aarch64
  - amd64

startup: application
boot: auto

ports:
  9584/tcp: 9584
ports_description:
  9584/tcp: "Portainer MCP HTTP endpoint"

map:
  - data:rw

options:
  portainer_url: ""
  portainer_token: ""

schema:
  portainer_url: str
  portainer_token: str
