---
name: "Nginx Proxy Manager MCP"
description: "Exposes Nginx Proxy Manager to AI clients via MCP with a secret-path HTTP URL"
version: "0.1.5"
slug: "nginx_proxy_manager_mcp"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64

# External resources
url: "https://nginxproxymanager.com"

startup: application
boot: auto

# Port configuration
ports:
  9565/tcp: 9565
ports_description:
  9565/tcp: "Nginx Proxy Manager MCP HTTP endpoint"

# Volume mapping for persisting secret path across restarts/updates
map:
  - data:rw

# Add-on configuration options
options:
  npm_url: ""
  npm_email: ""
  npm_password: ""
  secret_path: ""
schema:
  npm_url: url
  npm_email: email
  npm_password: password
  secret_path: str?
