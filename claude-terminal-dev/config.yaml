---
name: "Claude Terminal Dev"
description: "Development build of Claude Terminal - browser-based tab interface with Claude Code CLI"
version: "2.0.0-dev.4"
slug: "claude_terminal_dev"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# External resources
url: "https://github.com/anthropics/claude-code"

# Web interface configuration
ingress: true
ingress_port: 7682
panel_icon: mdi:code-braces-box
panel_title: "Claude Terminal Dev"
panel_admin: true

# Port configuration
ports:
  7682/tcp: 7682
ports_description:
  7682/tcp: "Web terminal dev (not required for ingress)"

# Add-on configuration options
options:
  auto_launch_claude: true
  claude_args: ""
  persistent_apt_packages: []
  persistent_pip_packages: []
  remote_control_directories: []
schema:
  auto_launch_claude: bool?
  claude_args: str?
  persistent_apt_packages:
    - str
  persistent_pip_packages:
    - str
  remote_control_directories:
    - directory: str
      args: str?
      prompt: str?

# Volume mappings for file access
map:
  - data:rw    # Add-on data directory (/data) - /home/claude is persisted here

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7682]/
