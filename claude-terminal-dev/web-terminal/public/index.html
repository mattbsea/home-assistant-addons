<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Terminal</title>
    <link rel="stylesheet" href="xterm/css/xterm.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div id="tab-bar">
        <button id="new-tab-btn" title="New shell tab">+</button>
    </div>
    <div id="terminal-container"></div>
    <div id="connection-status">Reconnecting...</div>
</div>

<script src="xterm/lib/xterm.js"></script>
<script src="xterm-addon-fit/lib/addon-fit.js"></script>
<script>
(function() {
    'use strict';

    const tabBar = document.getElementById('tab-bar');
    const newTabBtn = document.getElementById('new-tab-btn');
    const terminalContainer = document.getElementById('terminal-container');
    const connectionStatus = document.getElementById('connection-status');

    const tabs = new Map(); // tabId -> { el, terminal, fitAddon, wrapper, label, hasUnread }
    let activeTabId = null;
    let ws = null;
    let reconnectAttempts = 0;
    let tabConfig = [];

    // Generate a short random ID
    function genId() {
        return Math.random().toString(36).substring(2, 10);
    }

    // WebSocket URL derived from current page location (works through HA ingress)
    function getWsUrl() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const basePath = location.pathname.replace(/\/$/, '');
        return proto + '//' + location.host + basePath + '/ws';
    }

    // Connect WebSocket
    function connect() {
        var wsUrl = getWsUrl();
        ws = new WebSocket(wsUrl);

        ws.onopen = function() {
            reconnectAttempts = 0;
            connectionStatus.classList.remove('visible');
            console.log('WebSocket connected');
            send({ type: 'list' });
        };

        ws.onmessage = function(event) {
            var msg;
            try { msg = JSON.parse(event.data); } catch(e) { return; }
            handleMessage(msg);
        };

        ws.onclose = function() {
            reconnect();
        };

        ws.onerror = function() {
            ws.close();
        };
    }

    function reconnect() {
        reconnectAttempts++;
        const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), 10000);
        connectionStatus.classList.add('visible');
        connectionStatus.textContent = 'Reconnecting... (attempt ' + reconnectAttempts + ')';
        setTimeout(connect, delay);
    }

    function send(msg) {
        if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify(msg));
        }
    }

    // Handle server messages
    function handleMessage(msg) {
        switch (msg.type) {
            case 'sessions':
                tabConfig = msg.config || [];
                // Reconstruct tabs from existing server sessions
                if (msg.tabs && msg.tabs.length > 0) {
                    for (const tab of msg.tabs) {
                        if (!tabs.has(tab.tabId)) {
                            addTab(tab.tabId, tab.label, false);
                            // Request replay for reconnect
                            send({ type: 'replay', tabId: tab.tabId });
                        }
                    }
                    // Activate server-remembered tab or first tab
                    if (!activeTabId && msg.tabs.length > 0) {
                        var target = (msg.activeTabId && tabs.has(msg.activeTabId)) ? msg.activeTabId : msg.tabs[0].tabId;
                        switchTab(target);
                    }
                }
                break;

            case 'created':
                if (!tabs.has(msg.tabId)) {
                    addTab(msg.tabId, msg.label, true);
                }
                break;

            case 'output': {
                const tab = tabs.get(msg.tabId);
                if (tab) {
                    tab.terminal.write(msg.data);
                    if (msg.tabId !== activeTabId && !tab.hasUnread) {
                        tab.hasUnread = true;
                        tab.labelEl.textContent = '* ' + tab.label;
                        tab.el.classList.add('unread');
                    }
                }
                break;
            }

            case 'replay': {
                const tab = tabs.get(msg.tabId);
                if (tab && msg.data) {
                    tab.terminal.write(msg.data);
                }
                break;
            }

            case 'exited': {
                const tab = tabs.get(msg.tabId);
                if (tab) {
                    if (msg.restart) {
                        tab.status.textContent = 'Process exited (code ' + msg.exitCode + '). Restarting...';
                        tab.status.classList.add('visible');
                        setTimeout(function() {
                            tab.status.classList.remove('visible');
                        }, 35000);
                    } else {
                        tab.status.textContent = 'Process exited (code ' + msg.exitCode + ')';
                        tab.status.classList.add('visible');
                    }
                }
                break;
            }

            case 'respawned': {
                const tab = tabs.get(msg.tabId);
                if (tab) {
                    tab.terminal.clear();
                    tab.status.classList.remove('visible');
                }
                break;
            }

            case 'closed': {
                removeTab(msg.tabId);
                break;
            }
        }
    }

    // Add a tab to the UI
    function addTab(tabId, label, activate) {
        // Tab element
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.dataset.id = tabId;

        const labelEl = document.createElement('span');
        labelEl.className = 'tab-label';
        labelEl.textContent = label;
        tabEl.appendChild(labelEl);

        const closeEl = document.createElement('span');
        closeEl.className = 'tab-close';
        closeEl.textContent = '\u00d7';
        closeEl.addEventListener('click', function(e) {
            e.stopPropagation();
            closeTab(tabId);
        });
        tabEl.appendChild(closeEl);

        tabEl.addEventListener('click', function() {
            switchTab(tabId);
        });

        // Insert before the "+" button
        tabBar.insertBefore(tabEl, newTabBtn);

        // Terminal wrapper
        const wrapper = document.createElement('div');
        wrapper.className = 'terminal-wrapper';
        wrapper.dataset.id = tabId;

        const statusEl = document.createElement('div');
        statusEl.className = 'terminal-status';
        wrapper.appendChild(statusEl);

        terminalContainer.appendChild(wrapper);

        // Create xterm instance
        const terminal = new Terminal({
            scrollback: 10000,
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'Menlo', 'DejaVu Sans Mono', 'Consolas', monospace",
            theme: {
                background: '#1e1e1e',
                foreground: '#cccccc',
                cursor: '#ffffff',
                selectionBackground: '#264f78',
            },
            allowProposedApi: true,
        });

        const fitAddon = new FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);

        terminal.open(wrapper);

        // Custom link provider that handles URLs spanning multiple terminal rows.
        // Works for both soft-wrapped (isWrapped) and hard-wrapped (app newlines)
        // URLs like long OAuth authorize links.
        terminal.registerLinkProvider({
            provideLinks: function(y, callback) {
                var buf = terminal.buffer.active;

                function lineText(row) {
                    var l = buf.getLine(row);
                    return l ? l.translateToString(true) : '';
                }

                // Extract non-whitespace prefix from a line
                function urlPrefix(text) {
                    var m = text.match(/^[^\s]+/);
                    return m ? m[0] : '';
                }

                // Walk backward from hovered line to find https://
                // Stop at blank lines or lines starting with whitespace
                var httpRow = -1, httpCol = -1;
                for (var r = y - 1; r >= 0 && r >= y - 21; r--) {
                    var t = lineText(r);
                    var idx = t.search(/https?:\/\//);
                    if (idx >= 0) { httpRow = r; httpCol = idx; break; }
                    var prefix = urlPrefix(t);
                    if (prefix.length === 0) break;
                }

                if (httpRow < 0) { callback(undefined); return; }

                // Extract URL from first line (stop at whitespace if present)
                var firstPart = lineText(httpRow).substring(httpCol);
                var firstUrl = urlPrefix(firstPart);
                var url = firstUrl;
                var lastRow = httpRow;
                var lastLineUrlLen = firstUrl.length;

                // If URL fills to end of line, check continuation rows
                if (firstUrl.length === firstPart.length) {
                    for (var r = httpRow + 1; r < buf.length && r <= httpRow + 20; r++) {
                        var t = lineText(r);
                        var prefix = urlPrefix(t);
                        if (prefix.length === 0) break;
                        url += prefix;
                        lastRow = r;
                        lastLineUrlLen = prefix.length;
                        // If line had more content after URL portion, stop
                        if (prefix.length < t.length) break;
                    }
                }

                // Trim trailing non-URL punctuation
                var trimmed = url.replace(/[)\].,;:!?'"]+$/, '');
                lastLineUrlLen -= (url.length - trimmed.length);
                url = trimmed;

                // Verify hovered line is within the URL range
                if (y - 1 < httpRow || y - 1 > lastRow) {
                    callback(undefined); return;
                }

                // End column is based on how much URL text is on the last row
                var endCol = (lastRow === httpRow ? httpCol : 0) + lastLineUrlLen - 1;

                callback([{
                    range: {
                        start: { x: httpCol + 1, y: httpRow + 1 },
                        end: { x: endCol + 2, y: lastRow + 1 }
                    },
                    text: url,
                    activate: function() { window.open(url, '_blank'); }
                }]);
            }
        });

        // Handle input
        terminal.onData(function(data) {
            send({ type: 'input', tabId: tabId, data: data });
        });

        // Handle resize
        terminal.onResize(function(size) {
            send({ type: 'resize', tabId: tabId, cols: size.cols, rows: size.rows });
        });

        tabs.set(tabId, {
            el: tabEl,
            labelEl: labelEl,
            terminal: terminal,
            fitAddon: fitAddon,
            wrapper: wrapper,
            status: statusEl,
            label: label,
            hasUnread: false,
        });

        if (activate) {
            switchTab(tabId);
        }
    }

    // Switch active tab
    function switchTab(tabId) {
        if (activeTabId === tabId) return;

        // Deactivate current
        if (activeTabId) {
            const current = tabs.get(activeTabId);
            if (current) {
                current.el.classList.remove('active');
                current.wrapper.classList.remove('active');
            }
        }

        // Activate new
        const next = tabs.get(tabId);
        if (next) {
            next.el.classList.add('active');
            next.wrapper.classList.add('active');
            activeTabId = tabId;

            // Clear unread indicator
            if (next.hasUnread) {
                next.hasUnread = false;
                next.labelEl.textContent = next.label;
                next.el.classList.remove('unread');
            }

            // Tell server which tab is active
            send({ type: 'select', tabId: tabId });

            // Fit after becoming visible
            requestAnimationFrame(function() {
                next.fitAddon.fit();
                next.terminal.focus();
            });

            // Scroll tab into view
            next.el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        }
    }

    // Close a tab
    function closeTab(tabId) {
        send({ type: 'close', tabId: tabId });
        removeTab(tabId);
    }

    function removeTab(tabId) {
        const tab = tabs.get(tabId);
        if (!tab) return;

        tab.terminal.dispose();
        tab.el.remove();
        tab.wrapper.remove();
        tabs.delete(tabId);

        // If we closed the active tab, switch to the first remaining
        if (activeTabId === tabId) {
            activeTabId = null;
            const remaining = tabs.keys().next();
            if (!remaining.done) {
                switchTab(remaining.value);
            }
        }
    }

    // New tab: tap "+" to open a bash shell
    newTabBtn.addEventListener('click', function() {
        send({ type: 'create', tabId: genId(), command: '/bin/bash', args: [], label: 'Shell' });
    });

    // Handle window resize
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (activeTabId) {
                const tab = tabs.get(activeTabId);
                if (tab) {
                    tab.fitAddon.fit();
                }
            }
        }, 100);
    });

    // Start
    connect();
})();
</script>
</body>
</html>
