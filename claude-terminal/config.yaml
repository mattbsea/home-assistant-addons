---
name: "Claude Terminal"
description: "Terminal interface for Anthropic's Claude Code CLI with persistent auth and packages"
version: "1.23.0"
slug: "claude_terminal"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# External resources
url: "https://github.com/anthropics/claude-code"

# Web interface configuration
ingress: true
ingress_port: 7681
panel_icon: mdi:code-braces
panel_title: "Claude Terminal"
panel_admin: true

# Port configuration
ports:
  7681/tcp: 7681
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"

# Add-on configuration options
options:
  auto_launch_claude: true
  claude_args: ""
  persistent_apt_packages: []
  persistent_pip_packages: []
  remote_control_directories: []
schema:
  auto_launch_claude: bool?
  claude_args: str?
  persistent_apt_packages:
    - str
  persistent_pip_packages:
    - str
  remote_control_directories:
    - directory: str
      name: str
      permission_mode: "list(acceptEdits|bypassPermissions|default|dontAsk|plan)"
      spawn_mode: "list(same-dir|worktree|session)"

# Volume mappings for file access
map:
  - data:rw    # Add-on data directory (/data) - /home/claude is persisted here

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7681]/
